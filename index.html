<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AI出题 · 智能批改</title><style>
:root{--bg:#f5f5f7;--card:#fff;--text:#1d1d1f;--sub:#86868b;--accent:#5865f2;--accent2:#8b5cf6;--border:rgba(0,0,0,.06);--radius:16px;--green:#16a34a;--red:#dc2626}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#fff;color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px}
.nav-inner{max-width:1300px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:52px}
.nav-badge{font-size:.68em;padding:5px 12px;border-radius:20px;background:#fff;border:1px solid var(--border);color:var(--sub)}
.main{max-width:1300px;margin:0 auto;padding:24px 24px 40px;display:grid;grid-template-columns:280px 1fr;gap:20px}
.side-card{background:var(--card);box-shadow:0 4px 18px rgba(0,0,0,.18);border-radius:var(--radius);border:1px solid var(--border);padding:18px;margin-bottom:12px;overflow-y:auto}
.side-card h3{font-size:.75em;font-weight:700;letter-spacing:1px;color:var(--sub);margin-bottom:12px}
.sidebar{display:flex;flex-direction:column;height:calc(100vh - 100px);position:sticky;top:72px}
.main-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:0 4px 18px rgba(0,0,0,.18);padding:28px;display:flex;flex-direction:column;height:calc(100vh - 100px)}
.sidebar .side-card:last-child{flex:1;min-height:150px;display:flex;flex-direction:column;overflow:hidden}.sidebar .side-card:last-child::-webkit-scrollbar,.side-card::-webkit-scrollbar,#wrongList::-webkit-scrollbar{display:none}
.wrong-item{padding:12px 14px;border-radius:10px;font-size:.74em;margin-bottom:10px;background:#fef2f2;cursor:pointer;border-left:3px solid var(--red);border-bottom:1px solid rgba(0,0,0,.18);transition:.2s}.wrong-item:hover{background:#fee2e2}
.type-card{background:var(--card);border-radius:18px;padding:16px 14px;cursor:pointer;transition:all .3s cubic-bezier(.25,.1,.25,1);border:1px solid var(--border);box-shadow:0 4px 18px rgba(0,0,0,.18);display:flex;align-items:center;gap:12px;margin-bottom:8px}.type-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.18);border-color:rgba(88,101,242,.25)}.type-card .tc-icon{width:34px;height:34px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.8em;background:#f0f4ff}.type-card.active{background:#fafaff;border-color:var(--accent);box-shadow:0 4px 18px rgba(88,101,242,.15)}.type-card.active .tc-icon{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}.type-card .tc-name{font-size:.76em;font-weight:700;letter-spacing:-.2px}.type-card .tc-desc{font-size:.6em;color:var(--sub);margin-top:1px}
.q-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.q-type-badge{padding:3px 10px;border-radius:8px;font-size:.68em;font-weight:600;background:#f0f4ff;color:var(--accent)}
.q-content{flex:2;overflow-y:auto;min-height:0;-ms-overflow-style:none;scrollbar-width:none}.q-content::-webkit-scrollbar{display:none}
.q-text{font-size:1.05em;line-height:1.8;margin-bottom:20px;font-weight:700}
.options{display:flex;flex-direction:column;gap:14px;margin-bottom:16px}
.opt{padding:20px 18px;border:2px solid var(--border);border-radius:12px;font-size:.92em;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px;min-height:56px}.opt:hover{border-color:var(--accent)}.opt.selected{border-color:var(--accent);background:#f0f4ff}.opt.correct{border-color:var(--green);background:#f0fdf4}.opt.wrong{border-color:var(--red);background:#fef2f2}
.opt .letter{width:30px;height:30px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85em;flex-shrink:0}.opt.selected .letter{background:var(--accent);color:#fff}.opt.correct .letter{background:var(--green);color:#fff}.opt.wrong .letter{background:var(--red);color:#fff}
.btn-row{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px}.btn{padding:10px 22px;border-radius:22px;font-size:.84em;font-weight:700;cursor:pointer;border:0;display:inline-flex;align-items:center;gap:6px;transition:.25s}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 18px rgba(88,101,242,.25)}.btn-primary:hover{transform:translateY(-1px)}.btn-primary:disabled{opacity:.4;transform:none}
.btn-ghost{background:#fff;border:1px solid var(--border);color:var(--sub)}.btn-ghost:hover{border-color:var(--accent);color:var(--text)}
.essay-area{width:100%;min-height:260px;border:2px solid var(--border);border-radius:14px;padding:18px;font-size:.9em;line-height:2;font-family:inherit;resize:none;outline:none;margin-bottom:12px;overflow-y:auto;-ms-overflow-style:none;scrollbar-width:none}.essay-area::-webkit-scrollbar{display:none}.essay-area:focus{border-color:var(--accent)}
.explain-box{background:#fafafa;border-radius:12px;border:1px solid var(--border);padding:16px 20px;overflow-y:auto;font-size:.82em;line-height:1.9;margin-top:14px;flex:1;min-height:60px;text-align:center;color:var(--sub)}.explain-box::-webkit-scrollbar{display:none}.explain-box{-ms-overflow-style:none;scrollbar-width:none}.explain-box h4{font-size:.9em;margin-bottom:8px}
.loading-dots{display:flex;gap:5px;justify-content:center;padding:20px}.loading-dots span{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:ld 1.4s infinite}.loading-dots span:nth-child(2){animation-delay:.2s}.loading-dots span:nth-child(3){animation-delay:.4s}@keyframes ld{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1.2)}}
.mode-btn{padding:10px 22px;border-radius:20px;font-size:.82em;font-weight:700;cursor:pointer;border:0;transition:all .25s;display:inline-flex;align-items:center;gap:6px}.mode-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 22px rgba(88,101,242,.3)}.mode-btn.ghost{background:#fff;border:2px solid var(--border);color:var(--sub)}.mode-btn.ghost:hover{border-color:var(--accent);color:var(--accent)}
.footer{text-align:center;padding:24px;color:#b0b0b8;font-size:.65em;border-top:1px solid var(--border)}
.home-btn{position:fixed;left:0;top:72px;z-index:90;width:44px;height:44px;background:#fff;border:1px solid rgba(0,0,0,.06);border-left:0;border-radius:0 14px 14px 0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s;box-shadow:2px 0 12px rgba(0,0,0,.06);color:#86868b}.home-btn:hover{width:54px;color:#5865f2;box-shadow:4px 0 20px rgba(88,101,242,.15)}.home-btn svg{width:20px;height:20px}
@media(max-width:900px){
}
</style></head><body>
<a href="https://thanhtientt51-commits.github.io/gongkao-toolbox/" class="home-btn" title="返回主页"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>
<nav class="nav"><div class="nav-inner"><div style="font-size:.9em;font-weight:700"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-4px;margin-right:4px"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>AI出题 · 智能批改</div><div class="nav-badge">AI生成 + 批改 + 解析</div></div></nav>
<div style="max-width:1300px;margin:0 auto;padding:24px 24px 6px;display:flex;gap:8px"><button class="mode-btn active" id="btnXc" onclick="switchMode('xingce')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>行测出题</button><button class="mode-btn ghost" id="btnSl" onclick="switchMode('shenlun')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>申论出题</button></div>
<div class="main"><div class="sidebar"><div class="side-card" style="overflow-y:auto;max-height:40vh"><h3 id="catTitle">六大模块</h3><div id="catList"></div></div><div class="side-card" id="wrongBookCard" style="flex:1;min-height:150px;display:flex;flex-direction:column;overflow:hidden"><div style="display:flex;justify-content:space-between;align-items:center"><h3 style="margin-bottom:0">错题本</h3><button class="btn btn-ghost" style="font-size:.68em;padding:4px 10px" onclick="exportWrong()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:-3px;margin-right:3px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>导出Word</button></div><div id="wrongList" style="flex:1;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none;min-height:0"><div style="font-size:.7em;padding:20px;text-align:center;color:var(--sub)">暂无错题</div></div></div></div><div><div class="main-card"><div class="q-header"><span class="q-type-badge" id="qType">AI出题</span><span style="font-size:.68em;color:var(--sub)">选择分类自动生成</span></div><div class="q-content" id="qContent"><div style="text-align:center;color:var(--sub);padding:60px 20px;font-size:.85em">选择左侧分类，AI 将为你智能生成题目</div></div><div class="btn-row" id="btnRow" style="display:none"></div><div class="explain-box" id="explainBox">提交答案后，AI解析将显示在这里</div></div></div></div>
<footer class="footer">AI智能引擎驱动 · 仅供练习参考</footer>
<script>
var mode="xingce",selCat="",question=null,selOpt=-1,answered=false;
var xcCats=[{n:"判断推理",i:"🔍",d:"逻辑判断·图形推理"},{n:"言语理解",i:"📖",d:"阅读理解·语言运用"},{n:"数量关系",i:"🔢",d:"数学运算·数字推理"},{n:"资料分析",i:"📊",d:"数据解读·统计计算"},{n:"常识判断",i:"💡",d:"法律·文史·科技"},{n:"政治理论",i:"🏛️",d:"时政方针·思想理论"}];
var slCats=[{n:"概括归纳",i:"📝",d:"提炼要点·归纳总结"},{n:"提出对策",i:"💡",d:"问题分析·对策建议"},{n:"综合分析",i:"🔍",d:"观点评述·深入剖析"},{n:"应用文",i:"📄",d:"方案·通知·发言稿"},{n:"文章论述",i:"✍️",d:"自选角度·深入论述"}];
function switchMode(m){mode=m;selCat='';question=null;selOpt=-1;answered=false;document.getElementById('btnXc').className=m==='xingce'?'mode-btn active':'mode-btn ghost';document.getElementById('btnSl').className=m==='shenlun'?'mode-btn active':'mode-btn ghost';document.getElementById('catTitle').textContent=m==='xingce'?'六大模块':'五大题型';document.getElementById('btnRow').style.display='none';document.getElementById('qContent').innerHTML='<div style="text-align:center;color:var(--sub);padding:60px 20px;font-size:.85em">选择左侧分类，AI 将为你智能生成题目</div>';document.getElementById('explainBox').innerHTML='提交答案后，AI解析将显示在这里';document.getElementById('qType').textContent='AI出题';document.getElementById('wrongBookCard').style.display=m==='shenlun'?'none':'';renderCats()}
function renderCats(){var cats=mode==='xingce'?xcCats:slCats,h='';cats.forEach(function(c){h+='<div class="type-card'+(selCat===c.n?' active':'')+'" data-cat="'+c.n+'"><div class=tc-icon>'+c.i+'</div><div><div class=tc-name>'+c.n+'</div><div class=tc-desc>'+c.d+'</div></div></div>'});document.getElementById('catList').innerHTML=h}
document.getElementById('catList').addEventListener('click',function(e){var c=e.target.closest('.type-card');if(!c)return;var n=c.querySelector('.tc-name').textContent;pickCat(n,c)});
function pickCat(cat,el){selCat=cat;question=null;selOpt=-1;answered=false;document.querySelectorAll('#catList .type-card').forEach(function(p){p.classList.remove('active')});if(el)el.classList.add('active');document.getElementById('btnRow').style.display='none';document.getElementById('qType').textContent=cat;document.getElementById('explainBox').innerHTML='提交答案后，AI解析将显示在这里';generateQ()}
async function generateQ(){if(!selCat)return;var qc=document.getElementById('qContent');qc.innerHTML='<div class=loading-dots><span></span><span></span><span></span></div><div style="text-align:center;color:var(--sub);font-size:.8em">AI 正在生成题目...</div>';var prompt=mode==='xingce'?'你是公考行测出题老师。请为【'+selCat+'】分类出一道单选题，4个选项A/B/C/D，给出正确答案。输出严格按此格式，每行一项：题目：xxx\nA. xxx\nB. xxx\nC. xxx\nD. xxx\n答案：A（只写字母）':'你是公考申论出题老师。请为【'+selCat+'】题型出一道申论题，包含题目和材料。输出严格按此格式：题目：xxx\n材料：xxx（如无材料则写"无"）';try{var res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer sk-0541b3112cd44ec18041c235d380affc'},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:800,temperature:.8})});var d=await res.json(),r=d.choices[0].message.content;if(mode==='xingce'){parseXingce(r)}else{parseShenlun(r)}}catch(e){qc.innerHTML='<div style="text-align:center;color:var(--sub);padding:40px">生成失败，请重试</div>'}}
function parseXingce(r){var lines=r.split('\n'),qText='',opts=[],ans='';lines.forEach(function(l){l=l.trim();if(l.startsWith('题目：')||l.startsWith('题目:'))qText=l.replace(/^题目[：:]/,'').trim();else if(l.match(/^[A-D][\.、：:]/))opts.push(l.replace(/^[A-D][\.、：:]\s*/,'').trim());else if(l.startsWith('答案：')||l.startsWith('答案:'))ans=l.replace(/^答案[：:]/,'').trim().charAt(0)});question={q:qText,o:opts.slice(0,4),a:['A','B','C','D'].indexOf(ans)};if(question.a<0)question.a=0;renderXingceQ()}
function renderXingceQ(){var qc=document.getElementById('qContent'),o='',l=['A','B','C','D'];question.o.forEach(function(opt,i){o+='<div class="opt" onclick="selOption('+i+',this)"><span class=letter>'+l[i]+'</span>'+opt+'</div>'});qc.innerHTML='<div class=q-text>'+question.q+'</div><div class=options>'+o+'</div>';document.getElementById('btnRow').style.display='flex';document.getElementById('btnRow').innerHTML='<button class="btn btn-primary" id="btnSub" onclick="submitXc()">提交答案</button><button class="btn btn-ghost" onclick="generateQ()">换一题</button>';document.getElementById('explainBox').innerHTML='提交答案后，AI解析将显示在这里';selOpt=-1;answered=false}
function parseShenlun(r){var lines=r.split('\n'),qText='';lines.forEach(function(l){l=l.trim();if(l.startsWith('题目：')||l.startsWith('题目:'))qText=l.replace(/^题目[：:]/,'').trim();else if(l.startsWith('材料：')||l.startsWith('材料:')){var mat=l.replace(/^材料[：:]/,'').trim();if(mat!=='无')qText+='\n\n【材料】\n'+mat}else if(l)qText+='\n'+l});question={q:qText.trim()};renderShenlunQ()}
function renderShenlunQ(){var qc=document.getElementById('qContent');qc.innerHTML='<div class=q-text style="white-space:pre-wrap">'+question.q+'</div><textarea class="essay-area" id="essayInput" placeholder="在此输入你的申论答案…"></textarea>';document.getElementById('btnRow').style.display='flex';document.getElementById('btnRow').innerHTML='<button class="btn btn-primary" onclick="submitSl()">提交批改</button><button class="btn btn-ghost" onclick="generateQ()">换一题</button>';document.getElementById('explainBox').innerHTML='提交答案后，AI批改将显示在这里'}
function selOption(i,el){if(answered)return;selOpt=i;document.querySelectorAll('.opt').forEach(function(o){o.classList.remove('selected')});el.classList.add('selected')}
async function submitXc(){if(selOpt<0){alert('请先选择一个选项');return}answered=true;var btn=document.getElementById('btnSub');btn.disabled=true;btn.textContent='⏳ 批改中...';var l=['A','B','C','D'],ok=selOpt===question.a;document.querySelectorAll('.opt').forEach(function(o,i){o.style.pointerEvents='none';if(i===question.a)o.classList.add('correct');if(i===selOpt&&!ok)o.classList.add('wrong')});btn.textContent=ok?'✅ 正确':'❌ 错误';var wItem=ok?null:addToWrong();var eb=document.getElementById('explainBox');eb.innerHTML='<div class=loading-dots><span></span><span></span><span></span></div>';var info='题型:'+selCat+'|题目:'+question.q+'|选项:A.'+question.o[0]+' B.'+question.o[1]+' C.'+question.o[2]+' D.'+question.o[3]+'|正确答案:'+l[question.a]+'|我的答案:'+l[selOpt];try{var res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer sk-0541b3112cd44ec18041c235d380affc'},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:'你是行测名师，对这道题做深度解析。'+(ok?'做对了，给予肯定。':'做错了，详细分析原因。')+info}],max_tokens:600,temperature:.7})});var d=await res.json(),rr=d.choices[0].message.content.replace(/\n/g,'<br>');eb.innerHTML='<h4>AI · 解析</h4><div style="line-height:1.8;color:#555">'+rr+'</div>'}catch(e){eb.innerHTML='<div style="text-align:center;color:var(--sub);padding:20px">解析生成失败，请重试</div>'}}
async function submitSl(){var text=document.getElementById('essayInput').value.trim();if(!text||text.length<20){alert('请至少写20字');return}var eb=document.getElementById('explainBox');eb.innerHTML='<div class=loading-dots><span></span><span></span><span></span></div>';var info='题型:'+selCat+'|题目:'+question.q+'|作答:'+text;try{var res=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer sk-0541b3112cd44ec18041c235d380affc'},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:'你是申论阅卷考官，请对以下答案批改。从观点立意(25)、逻辑结构(25)、论证深度(25)、语言表达(25)评分，满分100，给出总分、优点、不足、建议。'+info}],max_tokens:800,temperature:.7})});var d=await res.json(),rr=d.choices[0].message.content.replace(/\n/g,'<br>');eb.innerHTML='<h4>AI 批改</h4><div style="line-height:1.9;color:#555">'+rr+'</div>'}catch(e){eb.innerHTML='<div style="text-align:center;color:var(--sub);padding:20px">批改失败，请重试</div>'}}
var WRONG_KEY='ai_quiz_wrong',wrongList=JSON.parse(localStorage.getItem(WRONG_KEY)||'[]');
function addToWrong(){if(!question)return;if(wrongList.some(function(w){return w.q===question.q}))return;var item={mode:mode,cat:selCat,q:question.q,o:question.o||[],a:question.a,my:selOpt>=0?selOpt:-1,hs:'',ds:''};wrongList.unshift(item);if(wrongList.length>50)wrongList=wrongList.slice(0,50);localStorage.setItem(WRONG_KEY,JSON.stringify(wrongList));renderWrong();return item}
function renderWrong(){var el=document.getElementById('wrongList');if(!el)return;if(!wrongList.length){el.innerHTML='<div style="font-size:.7em;padding:20px;text-align:center;color:var(--sub)">暂无错题</div>';return}el.innerHTML=wrongList.map(function(w,i){return'<div class="wrong-item" onclick="reviewWrong('+i+')">['+(w.mode==='xingce'?'行测':'申论')+':'+w.cat+'] '+w.q.substring(0,35)+'...<br><span style="font-size:.8em;color:var(--sub)">点击回顾</span></div>'}).join('')}
function reviewWrong(i){var w=wrongList[i];mode=w.mode;selCat=w.cat;question={q:w.q,o:w.o||[],a:w.a};selOpt=w.my;answered=true;document.getElementById('btnXc').className=mode==='xingce'?'mode-btn active':'mode-btn ghost';document.getElementById('btnSl').className=mode==='shenlun'?'mode-btn active':'mode-btn ghost';document.getElementById('wrongBookCard').style.display=mode==='shenlun'?'none':'';document.getElementById('catTitle').textContent=mode==='xingce'?'六大模块':'五大题型';document.getElementById('qType').textContent=w.cat+' (回顾)';renderCats();if(mode==='xingce'){var o='',l=['A','B','C','D'];w.o.forEach(function(opt,i){var cls=i===w.a?'correct':(i===w.my?'wrong':'');o+='<div class="opt '+cls+'" style="pointer-events:none"><span class=letter>'+l[i]+'</span>'+opt+'</div>'});document.getElementById('qContent').innerHTML='<div class=q-text>'+w.q+'</div><div class=options>'+o+'</div>';document.getElementById('btnRow').style.display='flex';document.getElementById('btnRow').innerHTML='<span style="font-size:.84em;font-weight:700;color:var(--sub)">你的:'+(w.my>=0?l[w.my]:'未选')+' 正确:'+l[w.a]+'</span><button class="btn btn-ghost" onclick="generateQ()">出新题</button>'}else{document.getElementById('qContent').innerHTML='<div class=q-text style="white-space:pre-wrap">'+w.q+'</div><textarea class="essay-area" style="pointer-events:none;background:#fafafa" placeholder="回顾模式"></textarea>';document.getElementById('btnRow').style.display='flex';document.getElementById('btnRow').innerHTML='<button class="btn btn-ghost" onclick="generateQ()">出新题</button>'}var eb=document.getElementById('explainBox');if(w.ds){eb.innerHTML='<h4>AI · 解析</h4><div style="line-height:1.8;color:#555">'+w.ds.replace(/\n/g,'<br>')+'</div>'}else{eb.innerHTML='<div style="text-align:center;color:var(--sub);padding:20px">回顾模式 · 暂无AI解析</div>'}}
function exportWrong(){if(!wrongList.length){alert('暂无错题');return}var t='<html><head><meta charset=UTF-8><style>body{font-family:SimSun;font-size:14px;line-height:1.8;padding:20px}li{padding:8px 0}</style></head><body><h2>AI出题 · 错题本</h2><ol>';wrongList.forEach(function(w,i){t+='<li><b>['+(w.mode==='xingce'?'行测':'申论')+':'+w.cat+']</b> '+w.q+'<br>你的:<b style="color:red">'+(w.my>=0?['A','B','C','D'][w.my]:'未选')+'</b> 正确:<b style="color:green">'+['A','B','C','D'][w.a]+'</b></li>'});t+='</ol></body></html>';var b=new Blob([t],{type:'application/msword'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='AI出题错题本.doc';a.click()}
renderCats();renderWrong();

</script></body></html>
